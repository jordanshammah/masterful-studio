<style>
  :root{
    --cream:#F4F0E8;
    --cream-2:#EAE4D8;
    --ink:#0E0E0E;
    --ink-2:#1A1A1A;
    --orange:#C4501A;
    --orange-2:#E36622;
    --rule:rgba(14,14,14,0.14);
    --rule-light:rgba(244,240,232,0.16);
    --mute:rgba(14,14,14,0.58);
    --mute-on-dark:rgba(244,240,232,0.62);
    --serif:'Instrument Serif', 'Times New Roman', serif;
    --sans:'Geist', -apple-system, BlinkMacSystemFont, sans-serif;
    --mono:'Geist Mono', ui-monospace, 'SFMono-Regular', monospace;
  }
  html,body{margin:0;padding:0;background:var(--cream);font-family:var(--sans);color:var(--ink);}
  *{box-sizing:border-box;}
  .m-frame{ width:100%; background:var(--cream); color:var(--ink); position:relative; font-family:var(--sans); }
  .m-frame.m-dark{ background:var(--ink); color:var(--cream); }
  .m-mono{ font-family:var(--mono); font-weight:400; letter-spacing:0.04em; text-transform:uppercase; font-size:11px; }
  .m-serif{ font-family:var(--serif); font-weight:400; font-style:normal; letter-spacing:-0.01em; }
  .m-orange{ color:var(--orange); }
  .m-rule{ border:0; border-top:1px solid var(--rule); }
  .m-dark .m-rule{ border-top-color:var(--rule-light); }
  .m-imgph{
    background-color:#dcd5c5;
    background-image: repeating-linear-gradient(135deg, rgba(14,14,14,0.06) 0 1px, transparent 1px 8px);
    color:rgba(14,14,14,0.55);
    display:flex; align-items:center; justify-content:center;
    font-family:var(--mono); font-size:10px; letter-spacing:0.08em; text-transform:uppercase;
  }
  .m-dark .m-imgph{
    background-color:#1f1f1f;
    background-image: repeating-linear-gradient(135deg, rgba(244,240,232,0.06) 0 1px, transparent 1px 8px);
    color:rgba(244,240,232,0.55);
  }
  .m-btn{
    display:inline-flex; align-items:center; gap:10px;
    padding:14px 22px; border-radius:999px; border:1px solid var(--ink);
    background:var(--ink); color:var(--cream); font:500 13px/1 var(--sans);
    letter-spacing:0.02em; text-decoration:none; cursor:pointer;
    transition: transform .15s ease, background .15s ease, color .15s ease;
  }
  .m-btn:hover{ background:var(--orange); border-color:var(--orange); }
  .m-btn.m-btn-orange{ background:var(--orange); border-color:var(--orange); color:var(--cream); }
  .m-btn.m-btn-orange:hover{ background:var(--ink); border-color:var(--ink); }
  .m-btn.m-btn-ghost{ background:transparent; color:var(--ink); }
  .m-dark .m-btn.m-btn-ghost{ color:var(--cream); border-color:var(--cream); }
  .m-link{ position:relative; text-decoration:none; color:inherit; }
  .m-link::after{
    content:""; position:absolute; left:0; right:0; bottom:-2px; height:1px;
    background:currentColor; transform-origin:left; transform:scaleX(1);
    transition:transform .3s cubic-bezier(.6,.1,.3,1);
  }
  .m-link:hover::after{ transform-origin:right; transform:scaleX(0); }
  .m-serif em, .m-serif .em { font-style:italic; }

  /* Page transition */
  .page-enter{ animation: pageIn .35s cubic-bezier(.2,.7,.3,1); }
  @keyframes pageIn { from{opacity:0; transform: translateY(8px)} to{opacity:1; transform:none} }

  /* The router uses anchors; smooth scroll to top on nav */
  html{ scroll-behavior: smooth; }
</style>
